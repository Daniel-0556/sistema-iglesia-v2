{% extends 'base.html' %}

{% block titulo %}Eliminar miembro{% endblock %}

{% block contenido %}
<div class="mb-4">
    <a href="{% url 'lista_miembros' %}" class="text-muted text-decoration-none small">
        <i class="bi bi-arrow-left me-1"></i>Volver a miembros
    </a>
    <h4 class="fw-bold mt-2">Eliminar miembro</h4>
</div>

<div class="card border-0 shadow-sm border-danger" style="max-width: 480px;">
    <div class="card-body p-4 text-center">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 48px;"></i>
        <h5 class="fw-bold mt-3">¿Estás segura?</h5>
        <p class="text-muted">
            Estás a punto de eliminar a
            <strong>{{ miembro.nombre_persona }}</strong>.
            Esta acción no se puede deshacer.
        </p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-4">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">
                <i class="bi bi-trash me-1"></i>Sí, eliminar
            </button>
            <a href="{% url 'lista_miembros' %}" class="btn btn-outline-secondary px-4">
                Cancelar
            </a>
        </form>
    </div>
</div>
{% endblock %}
