<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>En Mantenimiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a3c6e, #2a5298);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="card border-0 shadow-lg text-center p-5" style="max-width: 500px; border-radius: 16px;">
        <i class="bi bi-tools text-warning" style="font-size: 64px;"></i>
        <h2 class="fw-bold mt-3">Sitio en Mantenimiento</h2>
        <p class="text-muted">{{ mensaje }}</p>
        {% if contacto %}
            <p class="text-muted small">Contacto: <strong>{{ contacto }}</strong></p>
        {% endif %}
    </div>
</body>
</html>
