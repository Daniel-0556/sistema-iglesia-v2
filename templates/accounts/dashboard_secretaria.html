{% extends 'base.html' %}

{% block titulo %}Dashboard Secretaria{% endblock %}

{% block contenido %}
<h4 class="fw-bold mb-4">Panel de la Secretaria</h4>

<div class="row g-3">
    <div class="col-md-4">
        <a href="{% url 'lista_miembros' %}" class="text-decoration-none">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="bg-primary bg-opacity-10 rounded-3 p-3">
                        <i class="bi bi-people text-primary fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Miembros</div>
                        <div class="fw-bold fs-5">{{ total_miembros }}</div>
                    </div>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="{% url 'lista_eventos' %}" class="text-decoration-none">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="bg-warning bg-opacity-10 rounded-3 p-3">
                        <i class="bi bi-calendar-event text-warning fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Eventos</div>
                        <div class="fw-bold fs-5">{{ total_eventos }}</div>
                    </div>
                </div>
            </div>
        </a>
    </div>
</div>
{% endblock %}
