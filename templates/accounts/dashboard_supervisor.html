{% extends "base.html" %}

{% block titulo %}Dashboard Supervisor{% endblock %}

{% block contenido %}
<h4 class="fw-bold mb-4">Panel del Supervisor</h4>

<div class="row g-3">

    <!-- Miembros -->
    <div class="col-md-3">
        <a href="{% url 'lista_miembros' %}" class="text-decoration-none">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="bg-primary bg-opacity-10 rounded-3 p-3">
                        <i class="bi bi-people text-primary fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Miembros</div>
                        <div class="fw-bold fs-5">{{ total_miembros }}</div>
                    </div>
                </div>
            </div>
        </a>
    </div>

    <!-- Usuarios -->
    <div class="col-md-3">
        <a href="{% url 'lista_usuarios' %}" class="text-decoration-none">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="bg-success bg-opacity-10 rounded-3 p-3">
                        <i class="bi bi-person-gear text-success fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Usuarios</div>
                        <div class="fw-bold fs-5">{{ total_usuarios }}</div>
                    </div>
                </div>
            </div>
        </a>
    </div>

    <!-- Eventos -->
    <div class="col-md-3">
        <a href="{% url 'lista_eventos' %}" class="text-decoration-none">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="bg-warning bg-opacity-10 rounded-3 p-3">
                        <i class="bi bi-calendar-event text-warning fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Eventos</div>
                        <div class="fw-bold fs-5">{{ total_eventos }}</div>
                    </div>
                </div>
            </div>
        </a>
    </div>

    <!-- Solicitudes pendientes -->
    <div class="col-md-3">
        <a href="{% url 'gestionar_solicitudes' %}" class="text-decoration-none">
            <div
                class="card border-0 shadow-sm h-100 {% if solicitudes_pendientes > 0 %}border-danger border{% endif %}">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="bg-danger bg-opacity-10 rounded-3 p-3">
                        <i
                            class="bi bi-bell {% if solicitudes_pendientes > 0 %}text-danger{% else %}text-muted{% endif %} fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Solicitudes</div>
                        <div class="fw-bold fs-5 {% if solicitudes_pendientes > 0 %}text-danger{% endif %}">
                            {{ solicitudes_pendientes }}
                        </div>
                    </div>
                </div>
            </div>
        </a>
    </div>

</div>
{% endblock %}
