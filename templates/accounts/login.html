{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a3c6e, #2a5298);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 400px;
            border-radius: 16px;
            border: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
        }
        .logo-container {
            background-color: #2e62f1;
            border-radius: 16px 16px 0 0;
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #dee2e6;
        }
        .logo-container img {
            max-height: 140px;
            max-width: 270px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="logo-container">
            {% if config and config.logo_sistema %}
                <img src="{{ config.logo_sistema.url }}" alt="Logo">
            {% else %}
                <i class="bi bi-building text-primary" style="font-size: 48px;"></i>
            {% endif %}
            <div class="fw-bold mt-2">
                {{ config.nombre_sistema|default:"Sistema Iglesia" }}
            </div>
        </div>

        <div class="card-body p-4">
            <h5 class="fw-bold text-center mb-1">Bienvenido</h5>
            <p class="text-muted text-center small mb-4">Ingresa tus credenciales para continuar</p>

            {% if form.errors %}
                <div class="alert alert-danger py-2 small">
                    <i class="bi bi-exclamation-circle me-1"></i>
                    Usuario o contraseña incorrectos.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-person text-primary"></i>
                        </span>
                        <input type="text" name="username" class="form-control" autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-lock text-primary"></i>
                        </span>
                        <input type="password" name="password" class="form-control">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
            </form>
        </div>
    </div>
</body>
</html>
