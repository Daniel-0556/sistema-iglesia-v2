{% extends 'base.html' %}

{% block titulo %}Reportes{% endblock %}

{% block contenido %}
<h4 class="fw-bold mb-4">Reportes</h4>

<div class="row g-3">
    <div class="col-md-4">
        <a href="{% url 'reporte_por_evento' %}" class="text-decoration-none">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body p-4 text-center">
                    <div class="bg-primary bg-opacity-10 rounded-3 p-3 d-inline-block mb-3">
                        <i class="bi bi-calendar-event text-primary fs-2"></i>
                    </div>
                    <h5 class="fw-bold">Por evento</h5>
                    <p class="text-muted small mb-0">
                        Ver la asistencia detallada de cada evento
                    </p>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="{% url 'reporte_por_mes' %}" class="text-decoration-none">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body p-4 text-center">
                    <div class="bg-success bg-opacity-10 rounded-3 p-3 d-inline-block mb-3">
                        <i class="bi bi-calendar-month text-success fs-2"></i>
                    </div>
                    <h5 class="fw-bold">Por mes</h5>
                    <p class="text-muted small mb-0">
                        Resumen mensual de todos los eventos
                    </p>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="{% url 'reporte_poca_asistencia' %}" class="text-decoration-none">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body p-4 text-center">
                    <div class="bg-danger bg-opacity-10 rounded-3 p-3 d-inline-block mb-3">
                        <i class="bi bi-exclamation-triangle text-danger fs-2"></i>
                    </div>
                    <h5 class="fw-bold">Poca asistencia</h5>
                    <p class="text-muted small mb-0">
                        Miembros con menos del 30% de asistencia
                    </p>
                </div>
            </div>
        </a>
    </div>
</div>
{% endblock %}
